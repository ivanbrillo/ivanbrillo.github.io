    Research Experience:
      - label: "Visiting Student — École Polytechnique de Montréal (2026, Montréal)"
        details: Awarded fully-funded Mitacs scholarship to develop CNN surrogates for replacing computationally expensive Gaussian Process updates in neurostimulation methods. Supervisor M. Bonizzato.

      - label: "Student Researcher — University of Pisa & Research Center E. Piaggio (2025–present, Pisa)"
        details: Framing R-peak prediction from EEG as a segmentation problem via distance-to-peak estimation, evaluating multi-scale CNNs and autoregressive models with a focus on domain generalization. Supervisor M. Cimino.

      - label: "Student Researcher — Sant'Anna School & Monasterio Foundation, TeCIP Institute (2025–2026, Pisa)"
        details: Cardiac amyloidosis classification from ECGs using Transformers, with interpretability via Grad-CAM and Attention Rollout (manuscript under review). Supervisor C.A. Avizzano.

      - label: "Student Researcher — Sant'Anna School of Advanced Studies, BioRobotics & TeCIP Institutes (2025, Pisa)"
        details: "Explainable classification of tumor-mimicking materials from force/position data (Supervisor C.M. Oddo). Efficient federated learning via dynamic training-precision adjustment (Supervisor E. Paolini)."

      - label: "Internship & Bachelor Thesis — RFX Consortium and CNR (2023–2024, Padua)"
        details: Investigated autoencoders and VAEs for temporal analysis of plant stress responses after irrigation with plasma-activated water (PAW). Supervisor V. Antoni.

    Work Experience:
      - label: "Computer Engineer Part-Time — UP caeli via (2024, Padua)"
        details: Software integration for drones (QGC and ArduPilot) using C++ and Qt/QML (GeoFencing, RTK and RTSP).

      - label: "Embedded Software Developer — Formula SAE Team Project (2022–2024, Padua)"
        details: Member of a 50-person university racing team, developing embedded systems (ATmega32/64, TI F2837, Arduino) and C control algorithms for power management, torque vectoring, and regenerative braking.

